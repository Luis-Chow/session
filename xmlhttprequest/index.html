<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="input-group">
        <input type="text" id="inputMensaje" placeholder="Escribe tu mensaje aquí...">
    </div>

    <div class="button-group">
        <button id="btnEnviarXHR" class="btn-xhr">Enviar usando XHR</button>
        <button id="btnEnviarFetch" class="btn-fetch">Enviar usando Fetch</button>
    </div>

    <div class="button-group">
        <button id="btnHolaXHR" class="btn-xhr">Hola Mundo (XHR)</button>
        <button id="btnHolaFetch" class="btn-fetch">Hola Mundo (Fetch)</button>
    </div>
    
    <div id="respuesta"></div>

    <script src="app.js"></script>
</body>
</html>
