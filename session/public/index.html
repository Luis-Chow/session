<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Sesion</title>
</head>
<body>
  <main class="card">
    <h1>Bienvenido</h1>

    <form id="formLogin" class="form">
      <label>Usuario
        <input type="text" name="user_na" autocomplete="username" required>
      </label>
      <label>Contraseña
        <input type="password" name="user_pw" autocomplete="current-password" required>
      </label>
      <button type="submit">Entrar</button>
    </form>

    <section id="panel" class="panel hidden">
      <p id="whoami" class="whoami"></p>

      <div class="panel-actions">
        <button id="btnListUsers" type="button">Ejecutar listUsers</button>
        <button id="btnLogout" type="button" class="secondary">Cerrar sesión</button>
      </div>

      <!-- Solo se muestra a los administradores (ver app.js). -->
      <section id="registerBox" class="register-box hidden">
        <h2>Crear cuenta</h2>
        <form id="formRegister" class="form">
          <label>Usuario
            <input type="text" name="user_na" autocomplete="off" required>
          </label>
          <label>Contraseña
            <input type="password" name="user_pw" autocomplete="new-password" required>
          </label>
          <small class="hint">Mínimo 8 caracteres, sin espacios, con mayúscula, minúscula y número.</small>
          <button type="submit">Crear cuenta</button>
        </form>
        <p id="registerMsg" class="msg"></p>
      </section>

      <p id="resultMsg" class="msg"></p>
      <div id="resultList" class="list"></div>
    </section>

    <p id="msg" class="msg"></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
