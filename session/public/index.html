<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Sesion</title>
</head>
<body>
  <main class="card">
    <h1>Bienvenido</h1>
    <div class="tabs">
      <button id="tabLogin" class="tab active" type="button">Iniciar sesión</button>
      <button id="tabRegister" class="tab" type="button">Registrarse</button>
    </div>

    <form id="formLogin" class="form">
      <label>Usuario
        <input type="text" name="user_na" autocomplete="username" required>
      </label>
      <label>Contraseña
        <input type="password" name="user_pw" autocomplete="current-password" required>
      </label>
      <button type="submit">Entrar</button>
    </form>

    <form id="formRegister" class="form hidden">
      <label>Usuario
        <input type="text" name="user_na" autocomplete="username" required>
      </label>
      <label>Contraseña
        <input type="password" name="user_pw" autocomplete="new-password" required>
      </label>
      <small class="hint">Mínimo 8 caracteres, sin espacios, con mayúscula, minúscula y número.</small>
      <button type="submit">Crear cuenta</button>
    </form>

    <section id="panel" class="panel hidden">
      <p id="whoami" class="whoami"></p>

      <div class="products">
        <h2>Productos</h2>
        <div class="prod-form">
          <input id="prodName" type="text" placeholder="Nombre del producto">
          <input id="prodPrice" type="number" step="0.01" placeholder="Precio">
        </div>
        <div class="panel-actions">
          <button id="btnList" type="button">Ver productos</button>
          <button id="btnInsert" type="button">Cargar producto</button>
        </div>
        <p id="prodMsg" class="msg"></p>
        <div id="productList" class="product-list"></div>
      </div>

      <div id="adminPanel" class="admin hidden">
        <h2>Admin · Gestión de permisos</h2>
        <div class="grant-row">
          <select id="gmProfile" title="Perfil"></select>
          <select id="gmMethod" title="Método"></select>
          <button id="btnGrantMethod" type="button">Otorgar método</button>
        </div>
        <div class="grant-row">
          <select id="goProfile" title="Perfil"></select>
          <select id="goOption" title="Opción"></select>
          <button id="btnGrantOption" type="button">Otorgar opción</button>
        </div>
        <p id="adminMsg" class="msg"></p>
      </div>

      <div class="panel-actions">
        <button id="btnLogout" type="button" class="secondary">Cerrar sesión</button>
      </div>
    </section>

    <p id="msg" class="msg"></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
